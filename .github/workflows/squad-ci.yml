name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install docs tools
        run: npm install --no-save markdownlint-cli2 cspell

      - name: Lint docs markdown
        run: npx markdownlint-cli2

      - name: Spell check docs
        run: npx cspell --no-progress --dot "docs/src/content/**/*.md" "README.md"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          # Auto-fix stale nested workspace entries that shadow symlinks
          STALE=$(node -e "
            const lock = require('./package-lock.json');
            const pkgs = lock.packages || {};
            const stale = Object.keys(pkgs).filter(k =>
              k.includes('/node_modules/@bradygaster/squad-') &&
              pkgs[k].resolved && pkgs[k].resolved.startsWith('https://')
            );
            if (stale.length) { console.log('found'); } else { console.log('clean'); }
          ")
          if [ "$STALE" = "found" ]; then
            echo "::warning::Stale workspace entries in lockfile — using npm install to auto-fix"
            npm install
          else
            npm ci
          fi

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
